<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 · ARAHA Marketing Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Libre Bodoni', Georgia, serif;
      background: #fff;
      color: #000;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px 64px;
    }
    .hero-top {
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.05em;
      font-weight: 700;
    }
    .hero-top .name {
      font-weight: 400;
      margin-top: 4px;
      letter-spacing: 0.15em;
    }
    .hero-title {
      text-align: center;
      padding: 32px 0;
    }
    .hero-title h1 {
      font-size: clamp(56px, 13vw, 200px);
      font-weight: 700;
      line-height: 0.92;
      letter-spacing: -0.02em;
    }
    .hero-title h1.italic {
      font-style: italic;
      font-weight: 400;
    }
    .hero-bottom {
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
    }
    @media (max-width: 900px) {
      .hero { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-top">
      <div>2026</div>
      <div class="name">ARAHA</div>
    </div>
    <div class="hero-title">
      <h1>MARKETING</h1>
      <h1 class="italic">PORTFOLIO</h1>
    </div>
    <div class="hero-bottom">
      Content · Performance · AI
    </div>
  </section>
</body>
</html>
